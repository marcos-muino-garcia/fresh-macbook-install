name: shellcheck

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1090/SC1091: ignore "can't follow non-constant source" — we
          # source files like ~/.zshrc.local that don't exist in CI.
          SHELLCHECK_OPTS: -e SC1090 -e SC1091
        with:
          scandir: "."
          # dotfiles/ and templates/ contain zsh runtime config (no shebang,
          # sourced by zsh — not POSIX shell scripts), so skip them.
          ignore_paths: "dotfiles templates"
          severity: warning
